services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-raguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragpass}
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-raguser} -d ${POSTGRES_DB:-ragdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  safeguard:
    image: vllm/vllm-openai:latest
    #image: vllm/vllm-openai:v0.6.6.post1
    command: >
      --model kakaocorp/kanana-safeguard-prompt-2.1b
      --port 8001
      --max-model-len 4096
      --dtype bfloat16
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8001:8001"
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      SAFEGUARD_BASE_URL: http://safeguard:8001/v1
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - uploads_data:/app/uploads
      - ./apps/widget:/app/static/widget:ro
      - icons_data:/app/static/icons
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: /rag/api/v1
      # 서버 사이드 프록시가 Docker 내부 네트워크로 FastAPI를 호출할 때 사용
      INTERNAL_API_URL: http://api:8000
      # standalone server.js가 0.0.0.0에 바인딩하도록 설정 (healthcheck용)
      HOSTNAME: "0.0.0.0"
    ports:
      - "3005:3000"
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://0.0.0.0:3000/rag/admin || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped


  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      admin:
        condition: service_healthy
      api:
        condition: service_started
    restart: unless-stopped

  nginx-reloader:
    image: docker:cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        docker events \
          --filter label=com.docker.compose.project=rag \
          --filter label=com.docker.compose.service=admin \
          --filter event=start \
        | while read -r _; do
            sleep 5
            docker exec rag-nginx-1 nginx -s reload
            echo "nginx reloaded after admin restart"
          done
    depends_on:
      - nginx
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  icons_data:
  huggingface_cache:
