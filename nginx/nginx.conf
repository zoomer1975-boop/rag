worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # SSE 스트리밍을 위한 버퍼 비활성화
    proxy_buffering off;
    proxy_cache off;

    upstream api {
        server api:8000;
    }

    upstream admin {
        server admin:3000;
    }

    server {
        listen 80;
        server_name _;

        # ========================
        # 보안 헤더
        # ========================
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ========================
        # /rag/api → FastAPI
        # ========================
        location /rag/api/ {
            proxy_pass http://api/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Prefix /rag;

            # SSE 스트리밍 설정
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            chunked_transfer_encoding on;
        }

        # ========================
        # /rag/widget → FastAPI static
        # ========================
        location /rag/widget/ {
            proxy_pass http://api/widget/;
            proxy_set_header Host $host;
            expires 1h;
            add_header Cache-Control "public, max-age=3600";
        }

        # ========================
        # /rag/static → FastAPI static (icons 등)
        # ========================
        location /rag/static/ {
            proxy_pass http://api/static/;
            proxy_set_header Host $host;
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
        }

        # ========================
        # /rag/admin/api/admin/.../chat-test → SSE 스트리밍
        # ========================
        location ~ ^/rag/admin/api/admin/tenants/[^/]+/chat-test {
            proxy_pass http://admin$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Connection '';

            # SSE 버퍼링 완전 비활성화
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            chunked_transfer_encoding on;
        }

        # ========================
        # /rag/admin → Next.js
        # trailing slash 제거: Next.js basePath는 /rag/admin (슬래시 없음)
        # ========================
        location /rag/admin {
            absolute_redirect off;
            proxy_pass http://admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_read_timeout 120s;
            proxy_redirect off;
        }

        # ========================
        # /rag/docs → FastAPI OpenAPI
        # ========================
        location /rag/docs {
            proxy_pass http://api/docs;
            proxy_set_header Host $host;
        }

        location /rag/openapi.json {
            proxy_pass http://api/openapi.json;
            proxy_set_header Host $host;
        }

        # 기본 redirect
        location = /rag {
            return 301 /rag/admin/;
        }

        location = / {
            return 301 /rag/admin/;
        }
    }
}
