worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # H-4: 업로드 최대 크기 제한 (MAX_UPLOAD_SIZE_MB 60 MB + 여유분)
    client_max_body_size 60M;

    # SSE 스트리밍을 위한 버퍼 비활성화
    proxy_buffering off;
    proxy_cache off;

    # Docker 내부 DNS — valid=10s 로 컨테이너 재시작 시 IP 자동 재조회
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name _;

        # ========================
        # 보안 헤더
        # ========================
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # H-2: Content Security Policy
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self';" always;

        # H-3: HSTS (HTTP → HTTPS 리다이렉트가 설정된 경우에만 의미 있음)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # ========================
        # /rag/api → FastAPI
        # ========================
        location /rag/api/ {
            set $upstream_api http://api:8000;
            proxy_pass $upstream_api/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Prefix /rag;

            # SSE 스트리밍 설정
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            chunked_transfer_encoding on;
        }

        # ========================
        # /rag/widget → FastAPI static
        # ========================
        location /rag/widget/ {
            set $upstream_api http://api:8000;
            proxy_pass $upstream_api/widget/;
            proxy_set_header Host $host;
            expires 1h;
            add_header Cache-Control "public, max-age=3600";
        }

        # ========================
        # /rag/static → FastAPI static (icons 등)
        # ========================
        location /rag/static/ {
            set $upstream_api http://api:8000;
            proxy_pass $upstream_api/static/;
            proxy_set_header Host $host;
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
        }

        # ========================
        # /rag/admin/api/admin/.../chat-test → SSE 스트리밍
        # ========================
        location ~ ^/rag/admin/api/admin/tenants/[^/]+/chat-test {
            set $upstream_admin http://admin:3000;
            proxy_pass $upstream_admin$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Connection '';

            # SSE 버퍼링 완전 비활성화
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            chunked_transfer_encoding on;
        }

        # ========================
        # /rag/admin → Next.js
        # trailing slash 제거: Next.js basePath는 /rag/admin (슬래시 없음)
        # ========================
        location /rag/admin {
            set $upstream_admin http://admin:3000;
            absolute_redirect off;
            proxy_pass $upstream_admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_read_timeout 120s;
            proxy_redirect off;
        }

        # ========================
        # /rag/docs → FastAPI OpenAPI (H-5: 내부 네트워크만 허용)
        # ========================
        location /rag/docs {
            # Docker 내부 및 로컬 개발 환경만 허용
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            allow 10.0.0.0/8;
            deny all;

            set $upstream_api http://api:8000;
            proxy_pass $upstream_api/docs;
            proxy_set_header Host $host;
        }

        location /rag/openapi.json {
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            allow 10.0.0.0/8;
            deny all;

            set $upstream_api http://api:8000;
            proxy_pass $upstream_api/openapi.json;
            proxy_set_header Host $host;
        }

        # 기본 redirect
        location = /rag {
            return 301 /rag/admin/;
        }

        location = / {
            return 301 /rag/admin/;
        }
    }
}
